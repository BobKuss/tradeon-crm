version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tradeon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tradeon
      POSTGRES_PASSWORD: tradeon_dev
      POSTGRES_DB: tradeon_crm
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tradeon -d tradeon_crm']
      interval: 10s
      timeout: 5s
      retries: 5

